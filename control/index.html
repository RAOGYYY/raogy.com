<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Panel · RAOGY</title>
    <meta name="description" content="RAOGY Control Panel — manage blog posts, images and site content.">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#0f172a">

    <link rel="icon" type="image/svg+xml" href="/images/logo.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } };
    </script>
    <style>
        html { background: #f8fafc; }
        html.dark { background: #050816; }
        body { font-family: 'Inter', sans-serif; }

        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .bg-stage { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
        .aurora {
            position: absolute; inset: -10%;
            background:
                radial-gradient(ellipse 50% 40% at 20% 30%, rgba(139,92,246,0.35), transparent 60%),
                radial-gradient(ellipse 60% 50% at 85% 70%, rgba(59,130,246,0.30), transparent 60%),
                radial-gradient(ellipse 40% 30% at 50% 100%, rgba(236,72,153,0.25), transparent 60%);
            filter: blur(30px);
            animation: aurora 20s ease-in-out infinite alternate;
        }
        @keyframes aurora {
            0%   { transform: translate(0,0) scale(1); }
            100% { transform: translate(-3%, 2%) scale(1.08); }
        }
        .grid-lines {
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(99,102,241,0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99,102,241,0.08) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse at center, #000 20%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse at center, #000 20%, transparent 70%);
        }

        .card-3d {
            transform-style: preserve-3d;
            perspective: 1000px;
        }
    </style>
</head>
<body class="min-h-screen text-gray-900 dark:text-white transition-colors duration-300">

    <div class="bg-stage" aria-hidden="true">
        <div class="aurora"></div>
        <div class="grid-lines"></div>
    </div>

    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="w-full max-w-md card-3d">
            <!-- Theme toggle -->
            <div class="flex justify-end mb-4">
                <button onclick="toggleTheme()" class="p-2 rounded-lg bg-white/70 dark:bg-slate-800/70 backdrop-blur border border-gray-200 dark:border-slate-700 hover:bg-white dark:hover:bg-slate-700 transition-colors" aria-label="Toggle theme">
                    <svg class="w-4 h-4 hidden dark:block" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                    <svg class="w-4 h-4 dark:hidden" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path></svg>
                </button>
            </div>

            <!-- Brand -->
            <div class="flex items-center justify-center gap-3 mb-8">
                <img src="/images/logo.svg" alt="RAOGY" class="w-10 h-10">
                <div>
                    <div class="text-xl font-bold gradient-text">RAOGY</div>
                    <div class="text-xs text-gray-500 dark:text-gray-400 uppercase tracking-widest">Control Panel</div>
                </div>
            </div>

            <!-- Login card -->
            <div class="bg-white/90 dark:bg-slate-800/80 backdrop-blur-lg rounded-2xl shadow-2xl border border-gray-200 dark:border-slate-700 p-7">
                <div class="text-center mb-6">
                    <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-br from-purple-500 to-blue-600 mb-4 shadow-lg">
                        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"></path>
                        </svg>
                    </div>
                    <h1 class="text-2xl font-bold">Welcome back</h1>
                    <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Sign in to manage your blog</p>
                </div>

                <form id="login-form" class="space-y-4" onsubmit="return doLogin(event)">
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 dark:text-gray-300 mb-1.5 uppercase tracking-wider">Passphrase</label>
                        <div class="relative">
                            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                            <input id="password" name="password" type="password" required autofocus autocomplete="current-password"
                                class="w-full pl-10 pr-10 py-3 rounded-xl bg-gray-100 dark:bg-slate-900/50 border border-gray-200 dark:border-slate-700 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent text-sm">
                            <button type="button" id="toggle-visibility" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300" aria-label="Show/hide password">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                            </button>
                        </div>
                    </div>

                    <div id="err" class="text-xs text-red-500 text-center hidden">Wrong passphrase. Try again.</div>

                    <button type="submit" class="w-full py-3 rounded-xl bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-700 hover:to-blue-700 text-white font-semibold shadow-lg hover:shadow-xl transition-all">
                        Unlock Panel
                    </button>
                </form>

                <div class="mt-5 pt-5 border-t border-gray-200 dark:border-slate-700 text-center">
                    <p class="text-[11px] text-gray-500 dark:text-gray-400">
                        Mode: <span class="font-mono font-semibold" id="mode-label">local</span>
                        <span class="mx-2">·</span>
                        Posts in browser: <span class="font-mono font-semibold" id="count-label">–</span>
                    </p>
                </div>
            </div>

            <p class="text-center text-[11px] text-gray-500 dark:text-gray-400 mt-6">
                Change passphrase in <code class="font-mono bg-gray-100 dark:bg-slate-800 px-1.5 py-0.5 rounded">config.js</code> &nbsp;·&nbsp;
                <a href="/" class="hover:text-purple-600 dark:hover:text-purple-400">Back to site</a>
            </p>
        </div>
    </div>

    <script src="/control/config.js"></script>
    <script src="/control/app.js"></script>
    <script>
        // Already logged in? → jump to dashboard
        if (RAOGY.isLoggedIn()) {
            window.location.href = '/control/dashboard.html';
        }

        // Show mode + post count
        document.getElementById('mode-label').textContent = RAOGY_CONFIG.mode;
        RAOGY.loadPosts().then(data => {
            document.getElementById('count-label').textContent = (data.posts || []).length;
        });

        // Show/hide password
        document.getElementById('toggle-visibility').addEventListener('click', () => {
            const pw = document.getElementById('password');
            pw.type = pw.type === 'password' ? 'text' : 'password';
        });

        function doLogin(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            if (RAOGY.login(password)) {
                window.location.href = '/control/dashboard.html';
            } else {
                document.getElementById('err').classList.remove('hidden');
                document.getElementById('password').value = '';
            }
            return false;
        }
        window.doLogin = doLogin;
    </script>
</body>
</html>
