<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Loading… - RAOGY Blog</title>
    <meta id="page-desc" name="description" content="Article on the RAOGY blog.">
    <meta name="author" content="RAOGY">
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)">

    <meta property="og:type" content="article">
    <meta id="og-title" property="og:title" content="RAOGY Blog">
    <meta id="og-desc" property="og:description" content="">
    <meta id="og-image" property="og:image" content="https://raogy.com/images/raogy.jpg">
    <meta id="og-url" property="og:url" content="">
    <link id="canonical" rel="canonical" href="">

    <link rel="icon" type="image/svg+xml" href="/images/logo.svg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Source+Code+Pro&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['Source Code Pro', 'monospace'] } } }
        };
    </script>
    <style>
        * { scroll-behavior: smooth; }
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Typography for rendered markdown */
        .prose-raogy { color: inherit; }
        .prose-raogy h1 { font-size: 2rem; font-weight: 800; margin: 2rem 0 1rem; line-height: 1.2; }
        .prose-raogy h2 { font-size: 1.5rem; font-weight: 700; margin: 2rem 0 1rem; line-height: 1.3; letter-spacing: -0.01em; border-bottom: 1px solid rgba(148,163,184,0.15); padding-bottom: 0.5rem; }
        .prose-raogy h3 { font-size: 1.25rem; font-weight: 700; margin: 1.5rem 0 0.75rem; }
        .prose-raogy p  { margin: 1rem 0; line-height: 1.75; color: rgb(55 65 81); }
        .dark .prose-raogy p { color: rgb(203 213 225); }
        .prose-raogy a  { color: rgb(124 58 237); text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 3px; }
        .dark .prose-raogy a { color: rgb(167 139 250); }
        .prose-raogy ul, .prose-raogy ol { margin: 1rem 0; padding-left: 1.5rem; }
        .prose-raogy li { margin: 0.25rem 0; line-height: 1.7; }
        .prose-raogy ul li { list-style: disc; }
        .prose-raogy ol li { list-style: decimal; }
        .prose-raogy blockquote {
            border-left: 4px solid rgb(139 92 246);
            padding: 0.75rem 1rem;
            margin: 1.25rem 0;
            background: rgba(139,92,246,0.06);
            border-radius: 0 8px 8px 0;
            font-style: italic;
            color: rgb(71 85 105);
        }
        .dark .prose-raogy blockquote { color: rgb(203 213 225); background: rgba(139,92,246,0.1); }
        .prose-raogy code {
            font-family: 'Source Code Pro', monospace;
            font-size: 0.875em;
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            background: rgb(243 244 246);
            color: rgb(219 39 119);
        }
        .dark .prose-raogy code { background: rgb(30 41 59); color: rgb(244 114 182); }
        .prose-raogy pre {
            background: rgb(15 23 42);
            color: rgb(226 232 240);
            padding: 1rem 1.25rem;
            border-radius: 10px;
            overflow-x: auto;
            margin: 1.25rem 0;
            font-family: 'Source Code Pro', monospace;
            font-size: 0.875rem;
            line-height: 1.65;
            border: 1px solid rgba(148,163,184,0.15);
        }
        .prose-raogy pre code { background: transparent; color: inherit; padding: 0; }
        .prose-raogy table { border-collapse: collapse; margin: 1.25rem 0; width: 100%; font-size: 0.9rem; }
        .prose-raogy th, .prose-raogy td { padding: 0.65rem 0.85rem; border: 1px solid rgba(148,163,184,0.2); text-align: left; }
        .prose-raogy th { background: rgba(139,92,246,0.08); font-weight: 600; }
        .prose-raogy img { max-width: 100%; height: auto; border-radius: 10px; margin: 1.25rem 0; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.2); }
        .prose-raogy hr { margin: 2rem 0; border-color: rgba(148,163,184,0.2); }

        /* Reading progress bar */
        .read-progress {
            position: fixed;
            top: 0; left: 0;
            height: 3px;
            width: 0%;
            background: linear-gradient(90deg, #8b5cf6, #3b82f6, #ec4899);
            z-index: 60;
            transition: width 0.15s ease;
        }
    </style>
</head>
<body class="min-h-screen text-gray-900 dark:text-white font-sans transition-colors duration-300">

    <div id="read-progress" class="read-progress"></div>

    <!-- Shared navbar + starfield from shell.js -->
    <div id="site-shell-header"></div>

    <!-- Hero cover -->
    <header id="post-header" class="pt-24 pb-8">
        <div class="container mx-auto px-6 max-w-3xl">
            <div id="cover" class="relative h-56 md:h-72 rounded-2xl bg-gradient-to-br from-purple-500 via-blue-500 to-pink-500 overflow-hidden shadow-xl mb-8">
                <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent"></div>
                <img id="cover-img" alt="" class="absolute inset-0 w-full h-full object-cover" onerror="this.style.display='none'" style="display:none">
                <div class="absolute bottom-4 left-5 right-5 flex flex-wrap gap-2">
                    <div id="cover-tags" class="flex flex-wrap gap-1.5"></div>
                </div>
            </div>

            <div id="meta" class="flex flex-wrap items-center gap-3 text-xs text-gray-500 dark:text-gray-400 mb-4"></div>

            <h1 id="title" class="text-3xl md:text-5xl font-bold leading-tight mb-4">Loading…</h1>

            <p id="excerpt" class="text-lg text-gray-600 dark:text-gray-300 leading-relaxed"></p>

            <!-- Share buttons -->
            <div class="flex items-center gap-2 mt-6 pb-6 border-b border-gray-200 dark:border-slate-700">
                <span class="text-xs font-semibold text-gray-500 dark:text-gray-400 mr-2">Share:</span>
                <a id="share-x" href="#" target="_blank" rel="noopener" class="p-2 rounded-lg bg-gray-100 dark:bg-slate-800 hover:bg-gray-200 dark:hover:bg-slate-700 transition-colors" aria-label="Share on X">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                </a>
                <a id="share-linkedin" href="#" target="_blank" rel="noopener" class="p-2 rounded-lg bg-gray-100 dark:bg-slate-800 hover:bg-gray-200 dark:hover:bg-slate-700 transition-colors" aria-label="Share on LinkedIn">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
                </a>
                <a id="share-whatsapp" href="#" target="_blank" rel="noopener" class="p-2 rounded-lg bg-gray-100 dark:bg-slate-800 hover:bg-gray-200 dark:hover:bg-slate-700 transition-colors" aria-label="Share on WhatsApp">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                </a>
                <button id="copy-link" onclick="copyLink()" class="p-2 rounded-lg bg-gray-100 dark:bg-slate-800 hover:bg-gray-200 dark:hover:bg-slate-700 transition-colors" aria-label="Copy link">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Post body -->
    <main class="pb-16">
        <div class="container mx-auto px-6 max-w-3xl">
            <article id="content" class="prose-raogy text-base md:text-lg"></article>

            <!-- Author box -->
            <div class="mt-12 p-5 rounded-xl bg-white/80 dark:bg-slate-800/70 border border-gray-200 dark:border-slate-700 backdrop-blur flex items-center gap-4">
                <img src="/images/raogy.jpg" alt="RAOGY" class="w-14 h-14 rounded-full object-cover border-2 border-purple-400">
                <div>
                    <div class="font-bold text-gray-900 dark:text-white">Written by RAOGY</div>
                    <p class="text-xs text-gray-600 dark:text-gray-400 mt-0.5">Web, iOS &amp; Android app developer. Shipping real products for real businesses.</p>
                    <div class="flex gap-3 mt-2 text-xs">
                        <a href="/" class="text-purple-600 dark:text-purple-400 hover:underline">Portfolio</a>
                        <a href="/#contact" class="text-purple-600 dark:text-purple-400 hover:underline">Contact</a>
                        <a href="https://github.com/RAOGYYY" target="_blank" rel="noopener" class="text-purple-600 dark:text-purple-400 hover:underline">GitHub</a>
                    </div>
                </div>
            </div>

            <!-- Related posts -->
            <div class="mt-12">
                <h3 class="text-2xl font-bold mb-5">More <span class="gradient-text">Articles</span></h3>
                <div id="related-grid" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
            </div>
        </div>
    </main>

    <!-- Shared footer -->
    <div id="site-shell-footer"></div>
    <script src="/assets/shell.js" data-active="blog"></script>

    <script>
        // Reading progress
        const progressEl = document.getElementById('read-progress');
        window.addEventListener('scroll', () => {
            const h = document.documentElement;
            const scrolled = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100;
            progressEl.style.width = Math.min(100, Math.max(0, scrolled)) + '%';
        }, { passive: true });

        // Get slug — supports clean URL /blog/:slug and legacy ?slug= query param
        const params = new URLSearchParams(window.location.search);
        const pathParts = window.location.pathname.split('/').filter(Boolean);
        const slug = (pathParts[0] === 'blog' && pathParts[1] && pathParts[1] !== 'post.html')
            ? pathParts[1]
            : params.get('slug');

        function formatDate(iso) {
            return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function showError(msg) {
            document.getElementById('title').textContent = 'Article not found';
            document.getElementById('content').innerHTML = `
                <p class="text-gray-600 dark:text-gray-400">${msg}</p>
                <a href="/blog/" class="inline-flex items-center gap-2 mt-4 text-purple-600 dark:text-purple-400 font-semibold">
                    ← Back to all articles
                </a>`;
        }

        function copyLink() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                const btn = document.getElementById('copy-link');
                const original = btn.innerHTML;
                btn.innerHTML = '<svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>';
                setTimeout(() => { btn.innerHTML = original; }, 2000);
            });
        }
        window.copyLink = copyLink;

        function render(post, allPosts) {
            // Meta
            document.getElementById('page-title').textContent = `${post.title} - RAOGY Blog`;
            document.getElementById('page-desc').setAttribute('content', post.excerpt || '');
            document.getElementById('og-title').setAttribute('content', post.title);
            document.getElementById('og-desc').setAttribute('content', post.excerpt || '');
            const canonicalUrl = `https://raogy.com/blog/${post.slug}`;
            document.getElementById('og-url').setAttribute('content', canonicalUrl);
            document.getElementById('canonical').setAttribute('href', canonicalUrl);

            // Cover
            const cover = document.getElementById('cover');
            if (post.coverGradient) {
                cover.className = `relative h-56 md:h-72 rounded-2xl bg-gradient-to-br ${post.coverGradient} overflow-hidden shadow-xl mb-8`;
            }
            if (post.cover) {
                const img = document.getElementById('cover-img');
                img.src = post.cover;
                img.style.display = '';
                img.alt = post.title;
            }
            document.getElementById('cover-tags').innerHTML = (post.tags || []).map(t =>
                `<span class="px-2.5 py-1 text-[11px] font-semibold rounded-full bg-white/90 dark:bg-slate-900/80 text-gray-800 dark:text-gray-200 backdrop-blur">${t}</span>`
            ).join('');

            // Meta row
            document.getElementById('meta').innerHTML = `
                <span class="inline-flex items-center gap-1.5 text-purple-600 dark:text-purple-400 font-semibold uppercase tracking-wider text-[11px]">
                    <span class="inline-block w-1.5 h-1.5 rounded-full bg-green-500"></span>
                    Published
                </span>
                <span>${formatDate(post.date)}</span>
                <span>•</span>
                <span>${post.readTime || '3 min read'}</span>
                <span>•</span>
                <span>By ${post.author || 'RAOGY'}</span>`;

            document.getElementById('title').textContent = post.title;
            document.getElementById('excerpt').textContent = post.excerpt || '';

            // Render content — supports both new HTML format and legacy markdown
            const raw = post.content || '';
            const isHtml = post.contentFormat === 'html' ||
                           /<\/?(p|h[1-6]|div|span|ul|ol|li|table|img|a|strong|em|code|pre|blockquote|br|hr)\b/i.test(raw);
            let html;
            if (isHtml) {
                html = raw;
            } else {
                marked.setOptions({ gfm: true, breaks: false, headerIds: true });
                html = marked.parse(raw);
            }
            document.getElementById('content').innerHTML = html;

            // Share URLs
            const url = encodeURIComponent(window.location.href);
            const text = encodeURIComponent(post.title);
            document.getElementById('share-x').href = `https://twitter.com/intent/tweet?text=${text}&url=${url}`;
            document.getElementById('share-linkedin').href = `https://www.linkedin.com/sharing/share-offsite/?url=${url}`;
            document.getElementById('share-whatsapp').href = `https://wa.me/?text=${text}%20${url}`;

            // Related posts (same tag, exclude current)
            const related = allPosts
                .filter(p => p.slug !== post.slug && p.published !== false && (p.tags || []).some(t => (post.tags || []).includes(t)))
                .slice(0, 2);
            const fallbackRelated = allPosts
                .filter(p => p.slug !== post.slug && p.published !== false)
                .slice(0, 2);
            const relatedFinal = related.length ? related : fallbackRelated;

            document.getElementById('related-grid').innerHTML = relatedFinal.map(p => `
                <a href="/blog/${encodeURIComponent(p.slug)}" class="group block bg-white/80 dark:bg-slate-800/70 rounded-xl overflow-hidden border border-gray-200 dark:border-slate-700 shadow-md hover:shadow-xl transition-all backdrop-blur">
                    <div class="h-32 bg-gradient-to-br ${p.coverGradient || 'from-purple-500 via-blue-500 to-pink-500'}"></div>
                    <div class="p-4">
                        <div class="text-[10px] uppercase tracking-wider text-purple-600 dark:text-purple-400 font-semibold mb-1">${formatDate(p.date)} • ${p.readTime || ''}</div>
                        <h4 class="text-sm font-bold text-gray-900 dark:text-white group-hover:text-purple-600 dark:group-hover:text-purple-400 transition-colors leading-snug">${p.title}</h4>
                    </div>
                </a>`).join('');
        }

        if (!slug) {
            showError('No article specified. Please go back and pick an article.');
        } else {
            fetch('/blog/posts.json', { cache: 'no-cache' })
                .then(r => r.ok ? r.json() : Promise.reject(r.status))
                .then(data => {
                    const post = (data.posts || []).find(p => p.slug === slug);
                    if (!post) {
                        showError('This article does not exist or has been removed.');
                        return;
                    }
                    render(post, data.posts || []);
                })
                .catch(() => showError('Could not load article. Please try again.'));
        }
    </script>
</body>
</html>
